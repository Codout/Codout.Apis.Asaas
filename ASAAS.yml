openapi: 3.0.0
info:
  title: API ASAAS v3
  description: >-
    Nós aqui do Asaas adoramos poupar tempo de todo mundo, por isso fizemos essa
    collection com todas as nossas APIs. 👍


    # Documentação

      
    A documentação completa pode ser acessada [neste
    link.](https://asaasv3.docs.apiary.io/)


    Ambientes disponíveis:


    *   Local

    *   Sandbox

    *   Produção
        

    Não esquece de consultar as variáveis da coleção.


    ## Autenticação


    Para testar os exemplos aqui descritos é necessário ter uma conta no Asaas.
    Caso você ainda não tenha, basta [criar uma conta clicando
    aqui](https://www.asaas.com/onboarding/createAccount?utm_source=postman) ou
    [aqui para criar em nossa
    sandbox](https://sandbox.asaas.com/onboarding/createAccount).


    A autenticação é feita através do fornecimento da sua API Key. Ela deve ser
    transmitida em todas as requisições no header \`access_token\`. Caso a API
    Key seja inválida ou não seja informada, o Asaas retornará `HTTP 401`.  

    As API Keys são distintas entre os ambientes de Sandbox e Produção, portanto
    lembre-se de alterá-la quando mudar a URL.  

    Para obter sua API Key [acesse a Aba Integração na área Minha
    Conta](https://www.asaas.com/config/index?tab=pushNotification).  

    Na collection sua API Key pode ser informada na área de ambientes.


    > ***Atenção***:  

    > Sua API Key carrega muitos privilégios, portanto certifique-se de mantê-la
    protegida. Não informe ela em atendimentos e nem a exponha no front-end da
    sua aplicação. Além disso, não é possível recuperá-la caso perdida, sendo
    necessário a geração de uma nova.
  version: 1.0.0
servers:
  - url: http://{{domain}}
  - url: https://www.asaas.com
components:
  securitySchemes:
    apikeyAuth:
      type: http
      scheme: apikey
security:
  - apikeyAuth: []
